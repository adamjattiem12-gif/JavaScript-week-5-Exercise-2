<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Profile Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    #profileCard {
      background-color: #ffffff;
      border: 2px solid #cccccc;
      border-radius: 10px;
      padding: 30px;
      width: 300px;
      text-align: center;
    }

    /* Active Status - green background when toggled on */
    #profileCard.active-status {
      background-color: #d4edda;
      border-color: #28a745;
    }

    #profileImage {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    #profileName {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }

    #profileRole {
      color: #555555;
      margin-bottom: 10px;
    }

    #profileBio {
      color: #777777;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #007bff;
      color: #ffffff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:last-of-type {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="profileCard">
    <img id="profileImage" src="https://placehold.co/100x100" alt="Profile Image">

    <h2 id="profileName">John Doe</h2>

    <p id="profileRole">Software Developer</p>

    <p id="profileBio">Passionate about coding and learning new technologies.</p>

    <button id="updateNameBtn">Update Name</button>

    <button id="updateRoleBtn">Update Role</button>

    <button id="toggleStatusBtn">Toggle Active Status</button>

    <button id="changeImageBtn">Change Image</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
